name: release-build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v0.0.1"
        required: true
      publish_release:
        description: "Upload packaged assets to the GitHub Release"
        required: false
        default: "true"
  push:
    tags:
      - 'v*'

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate interactive shell
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\validate-interactive-shell.ps1

      - name: Validate release tag input
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          if (-not $env:RELEASE_TAG) { throw 'missing RELEASE_TAG' }
          if (-not $env:RELEASE_TAG.StartsWith('v')) { throw "release tag must start with v: $env:RELEASE_TAG" }

  build-windows-linux-self-hosted:
    needs: validate
    runs-on:
      - self-hosted
      - Windows
      - X64
      - muldex
      - build-host-192-168-1-52
      - local-windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify host-managed Rust toolchain
        shell: pwsh
        run: |
          rustc --version
          cargo --version
          rustup target add x86_64-pc-windows-msvc

      - name: Build Windows release binaries (host-direct per PMA hybrid model)
        shell: pwsh
        run: |
          $vcvarsall = "D:\BuildTools\VS2022\VC\Auxiliary\Build\vcvarsall.bat"
          if (-not (Test-Path $vcvarsall)) {
            throw "Visual Studio environment script not found: $vcvarsall"
          }

          cmd /d /s /c "call `"$vcvarsall`" amd64 && cargo build -p muldex-cli --release --target x86_64-pc-windows-msvc"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Linux release binaries (podman cross build container on local host)
        shell: pwsh
        run: |
          $repo = $PWD.Path
          $wslPath = (wsl -d podman-machine-default wslpath -a $repo).Trim()
          $mount = "${wslPath}:/src:rw"
          wsl -d podman-machine-default podman run --rm -v $mount -v muldex-cargo-registry:/usr/local/cargo/registry -w /src rustembedded/cross:x86_64-unknown-linux-gnu cargo build -p muldex-cli --release --target x86_64-unknown-linux-gnu
          wsl -d podman-machine-default podman run --rm -v $mount -v muldex-cargo-registry:/usr/local/cargo/registry -w /src rustembedded/cross:aarch64-unknown-linux-gnu cargo build -p muldex-cli --release --target aarch64-unknown-linux-gnu

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\package-release-windows.ps1 -Target x86_64-pc-windows-msvc -ArtifactName muldex-x86_64-pc-windows-msvc

      - name: Verify Windows artifacts
        shell: pwsh
        run: |
          & .\scripts\verify-release-artifact.ps1 -ArtifactPath .\target\release-package\muldex-x86_64-pc-windows-msvc.zip -PlatformKind windows

      - name: Package Linux artifacts
        shell: bash
        run: |
          bash ./scripts/package-release-unix.sh x86_64-unknown-linux-gnu muldex-x86_64-unknown-linux-gnu
          bash ./scripts/package-release-unix.sh aarch64-unknown-linux-gnu muldex-aarch64-unknown-linux-gnu

      - name: Verify Linux artifacts
        shell: bash
        run: |
          python3 ./scripts/verify-release-artifact.py --artifact-path ./target/release-package/muldex-x86_64-unknown-linux-gnu.tar.gz --platform-kind unix
          python3 ./scripts/verify-release-artifact.py --artifact-path ./target/release-package/muldex-aarch64-unknown-linux-gnu.tar.gz --platform-kind unix

      - name: Upload packaged self-hosted artifacts
        uses: actions/upload-artifact@v4
        with:
          name: muldex-self-hosted-release-assets
          path: |
            target/release-package/muldex-x86_64-pc-windows-msvc.zip
            target/release-package/muldex-x86_64-unknown-linux-gnu.tar.gz
            target/release-package/muldex-aarch64-unknown-linux-gnu.tar.gz

  build-windows-arm64-github-hosted:
    needs: validate
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Verify ARM64 MSVC toolchain
        shell: pwsh
        run: |
          $vswhere = (Get-Command vswhere.exe -ErrorAction SilentlyContinue).Source
          if (-not $vswhere) {
            $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          }
          if (-not (Test-Path -LiteralPath $vswhere)) {
            throw "vswhere.exe not found: $vswhere"
          }

          $installPath = (& $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath).Trim()
          if (-not $installPath) {
            throw 'Visual Studio ARM64 C++ build tools are not installed'
          }

          $arm64Lib = Get-ChildItem -LiteralPath (Join-Path $installPath 'VC\Tools\MSVC') -Filter msvcrt.lib -File -Recurse |
            Where-Object { $_.FullName -match '\\lib\\arm64\\msvcrt\.lib$' } |
            Select-Object -First 1
          if (-not $arm64Lib) {
            throw "ARM64 MSVC runtime import library is missing under $installPath"
          }
          Write-Host "Using ARM64 MSVC library: $($arm64Lib.FullName)"

      - name: Build Windows ARM64 release binary
        shell: pwsh
        run: cargo build -p muldex-cli --release --target aarch64-pc-windows-msvc

      - name: Package Windows ARM64 release artifact
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\package-release-windows.ps1 -Target aarch64-pc-windows-msvc -ArtifactName muldex-aarch64-pc-windows-msvc

      - name: Verify Windows ARM64 packaged artifact
        shell: pwsh
        run: .\scripts\verify-release-artifact.ps1 -ArtifactPath .\target\release-package\muldex-aarch64-pc-windows-msvc.zip -PlatformKind windows

      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: muldex-aarch64-pc-windows-msvc
          path: target/release-package/muldex-aarch64-pc-windows-msvc.zip

  build-macos-github-hosted:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact_name: muldex-x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: muldex-aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build -p muldex-cli --release --target ${{ matrix.target }}

      - name: Package macOS release artifact
        run: bash ./scripts/package-release-unix.sh ${{ matrix.target }} ${{ matrix.artifact_name }}

      - name: Verify macOS packaged artifact
        shell: bash
        run: python3 ./scripts/verify-release-artifact.py --artifact-path ./target/release-package/${{ matrix.artifact_name }}.tar.gz --platform-kind unix

      - name: Upload packaged release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release-package/${{ matrix.artifact_name }}*

  publish-release:
    if: (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'dryrun')) || (github.event_name == 'workflow_dispatch' && inputs.publish_release != 'false')
    needs:
      - build-windows-linux-self-hosted
      - build-windows-arm64-github-hosted
      - build-macos-github-hosted
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Attach artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" release-artifacts/**/* --clobber
